<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mathemagicia" />
  <meta name="theme-color" content="#0B101D" />
  <title>Mathemagicia</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Comfortaa:wght@300;400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #0B101D;
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    #root {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: #0a0a0e;
    }

    /* Phone shell — centered, max 430px wide, full height on small screens */
    #phone {
      position: relative;
      width: 100%;
      max-width: 430px;
      height: 100%;
      max-height: 932px;
      overflow: hidden;
      background: #0B101D;
    }

    /* ── Shared ─────────────────────────────────────────── */
    .screen { width: 100%; height: 100%; overflow: hidden; position: relative; }
    .btn-reset { background: none; border: none; color: inherit; font: inherit; padding: 0; cursor: pointer; -webkit-tap-highlight-color: transparent; }

    /* ── Backgrounds ────────────────────────────────────── */
    .night-bg {
      background:
        radial-gradient(ellipse at 50% 0%, rgba(77,238,234,0.06), transparent 55%),
        radial-gradient(ellipse at 20% 100%, rgba(212,175,55,0.08), transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(229,193,88,0.05), transparent 60%),
        linear-gradient(180deg, #0B101D 0%, #060912 100%);
    }

    .paper-dark {
      background:
        radial-gradient(ellipse at 30% 30%, rgba(212,175,55,0.10), transparent 65%),
        radial-gradient(ellipse at 70% 70%, rgba(77,238,234,0.05), transparent 60%),
        repeating-linear-gradient(140deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 6px),
        linear-gradient(160deg, #121812 0%, #0b101d 100%);
    }

    /* ── Starfield ──────────────────────────────────────── */
    .starfield::before {
      content: '';
      position: absolute; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        radial-gradient(1px 1px at 12% 18%, rgba(229,193,88,0.7), transparent 60%),
        radial-gradient(1px 1px at 84% 26%, rgba(229,193,88,0.55), transparent 60%),
        radial-gradient(1px 1px at 22% 72%, rgba(255,255,255,0.4), transparent 60%),
        radial-gradient(1px 1px at 67% 84%, rgba(229,193,88,0.6), transparent 60%),
        radial-gradient(0.7px 0.7px at 45% 38%, rgba(255,255,255,0.45), transparent 60%),
        radial-gradient(0.6px 0.6px at 78% 56%, rgba(229,193,88,0.4), transparent 60%),
        radial-gradient(1.1px 1.1px at 30% 55%, rgba(229,193,88,0.5), transparent 60%),
        radial-gradient(0.9px 0.9px at 92% 88%, rgba(255,255,255,0.45), transparent 60%),
        radial-gradient(0.8px 0.8px at 8% 92%, rgba(229,193,88,0.4), transparent 60%);
    }

    /* ── Animations ─────────────────────────────────────── */
    @keyframes drift {
      0%   { transform: translate3d(0,0,0) scale(1);     opacity: var(--o, 0.7); }
      50%  { transform: translate3d(8px,-18px,0) scale(1.05); opacity: 1; }
      100% { transform: translate3d(-6px,6px,0) scale(0.95); opacity: var(--o, 0.7); }
    }
    .dust {
      position: absolute; border-radius: 50%;
      background: radial-gradient(circle, #E5C158 0%, rgba(229,193,88,0) 70%);
      filter: blur(0.3px);
      animation: drift 7s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    .gold-shimmer {
      background: linear-gradient(90deg, #8a6f1f 0%, #D4AF37 35%, #fff3b8 50%, #D4AF37 65%, #8a6f1f 100%);
      background-size: 200% 100%;
      -webkit-background-clip: text; background-clip: text;
      color: transparent;
      animation: shimmer 6s linear infinite;
    }

    @keyframes flicker { 0%,100% { opacity:1; } 50% { opacity:0.78; } }
    .flicker { animation: flicker 2.6s ease-in-out infinite; }

    @keyframes inkReveal {
      0%   { clip-path: inset(0 100% 0 0); }
      100% { clip-path: inset(0 0% 0 0); }
    }
    .ink-reveal { animation: inkReveal 1.6s cubic-bezier(.55,.05,.25,1) both; }

    @keyframes slowRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .gold-frame {
      border: 1px solid rgba(212,175,55,0.55);
      box-shadow: inset 0 0 0 1px rgba(212,175,55,0.15), inset 0 0 22px rgba(212,175,55,0.08);
    }
    .gold-double {
      border: 1px solid rgba(212,175,55,0.7);
      outline: 1px solid rgba(212,175,55,0.35);
      outline-offset: 4px;
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"><div id="phone"></div></div>

  <script src="../MathGame/graph-gen.js"></script>
  <script src="../MathGame/constellations-data.js"></script>
  <script type="text/babel" src="../MathGame/atoms.jsx"></script>
  <script type="text/babel" src="../MathGame/puzzles.jsx"></script>
  <script type="text/babel" src="../MathGame/puzzles-2.jsx"></script>
  <script type="text/babel" src="../MathGame/screens.jsx"></script>
  <script type="text/babel" src="../MathGame/prototype.jsx"></script>

  <script type="text/babel">
    // Запускаем игру прямо в #phone — без дизайн-канваса
    const root = ReactDOM.createRoot(document.getElementById('phone'));
    root.render(
      React.createElement(Prototype, {
        initialScreen: 'loading',
        initialChapter: 0,
        initialLevel: 1,
      })
    );
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>
